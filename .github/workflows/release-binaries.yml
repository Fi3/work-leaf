name: Release binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0. Required when running from a branch."
        required: false
        type: string
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "build-target"
      - ".github/workflows/release-binaries.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/build_target.rs"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            msvc_component: Microsoft.VisualStudio.Component.VC.Tools.x86.x64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            msvc_component: Microsoft.VisualStudio.Component.VC.Tools.ARM64
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build tools
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config

      - name: Verify macOS SDK
        if: startsWith(matrix.runner, 'macos-')
        run: |
          xcode-select -p
          xcrun --sdk macosx --show-sdk-path

      - name: Verify MSVC build tools
        if: startsWith(matrix.runner, 'windows-')
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe was not found; the MSVC toolchain is not installed."
          }

          $component = "${{ matrix.msvc_component }}"
          $installationPath = & $vswhere -latest -products * -requires $component -property installationPath
          if (!$installationPath) {
            throw "MSVC component $component was not found."
          }

          Write-Host "Found Visual Studio at $installationPath"

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"
          rustup default stable
          rustc -vV
          cargo -V

      - name: Build package
        env:
          WORK_LEAF_BUILD_TARGETS: ${{ matrix.target }}
        run: bash ./build-target

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: work-leaf-${{ matrix.target }}
          path: |
            dist/work-leaf-${{ matrix.target }}
            dist/work-leaf-${{ matrix.target }}.tar.gz
            dist/work-leaf-${{ matrix.target }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          tag="$INPUT_TAG"
          if [[ -z "$tag" && "$REF_TYPE" == "tag" ]]; then
            tag="$REF_NAME"
          fi

          if [[ -z "$tag" ]]; then
            echo "::error::Manual release runs from a branch must provide the workflow_dispatch tag input."
            exit 1
          fi

          if [[ ! "$tag" =~ ^v.+ ]]; then
            echo "::error::Release tag '$tag' must start with 'v'."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify release tag
        id: tag_status
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          git fetch --force --tags

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [[ "$tag_commit" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag '$RELEASE_TAG' points to $tag_commit, but this workflow built $GITHUB_SHA."
              echo "::error::Run the workflow from that tag, or use a tag that points at this commit."
              exit 1
            fi

            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: work-leaf-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          TAG_EXISTS: ${{ steps.tag_status.outputs.exists }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*.tar.gz release-assets/*.zip)

          if (( ${#assets[@]} == 0 )); then
            echo "::error::No release archive assets were downloaded."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            create_args=(--title "$RELEASE_TAG" --notes "Release $RELEASE_TAG")
            if [[ "$TAG_EXISTS" == "true" ]]; then
              create_args+=(--verify-tag)
            else
              create_args+=(--target "$GITHUB_SHA")
            fi

            gh release create "$RELEASE_TAG" "${assets[@]}" "${create_args[@]}"
          fi
